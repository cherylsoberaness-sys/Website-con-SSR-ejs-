<form method="GET" action="/products" class="mb-4">
  <div class="d-flex gap-2">
    <div>
      <div class="mb-3 w-25" style="width: 250px">
        <input type="text" name="name" class="form-control" style="width: 250px" placeholder="Buscar producto...">
      </div>
      <div class="d-flex gap-2 mb-3" style="max-width: 200pxpx;">
          <input type="number" name="priceMin" class="form-control" style="width: 150px" placeholder="Precio mín">
          <input type="number" name="priceMax" class="form-control" style="width: 150px" placeholder="Precio máx">
      </div>
    </div>
    <div class="" style="width: 200px">
      <label class="form-label mb-1" >Orden por:</label>
      <select name="sort" class="form-select form-select-sm select-compact">
        <option value="name">Nombre</option>
        <option value="price">$ menor a mayor</option>
        <option value="-price">$ mayor a menor</option>
      </select>
    </div>
  </div>
  <button type="submit" class="btn btn-primary">Aplicar filtros</button>
</form>
